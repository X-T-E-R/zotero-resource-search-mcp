          <html:label
            data-l10n-id="pref-web-api-key"
            style="min-width: 60px; margin-left: 8px; font-size: 0.9em"
          />
          <html:input
            type="password"
            preference="extensions.zotero.__addonRef__.web.mysearch.apiKey"
            style="flex: 1; max-width: 160px"
          />
        </hbox>
      </vbox>

      <!-- Individual API Keys (compact) -->
      <html:p
        style="font-weight: bold; font-size: 0.9em; margin: 4px 0"
        data-l10n-id="pref-web-individual-title"
      />
      <html:p
        style="color: #888; font-size: 0.8em; margin: 0 0 4px 0"
        data-l10n-id="pref-web-individual-hint"
      />
      <vbox style="padding: 0 0 0 4px">
        <hbox align="center" style="margin: 3px 0">
          <html:label style="min-width: 80px; font-size: 0.9em">Tavily</html:label>
          <html:input
            type="password"
            preference="extensions.zotero.__addonRef__.web.tavily.apiKey"
            placeholder="tvly-..."
            style="flex: 1; max-width: 320px"
          />
        </hbox>
        <hbox align="center" style="margin: 3px 0">
          <html:label style="min-width: 80px; font-size: 0.9em">Firecrawl</html:label>
          <html:input
            type="password"
            preference="extensions.zotero.__addonRef__.web.firecrawl.apiKey"
            placeholder="fc-..."
            style="flex: 1; max-width: 320px"
          />
        </hbox>
        <hbox align="center" style="margin: 3px 0">
          <html:label style="min-width: 80px; font-size: 0.9em">Exa</html:label>
          <html:input
            type="password"
            preference="extensions.zotero.__addonRef__.web.exa.apiKey"
            style="flex: 1; max-width: 320px"
          />
        </hbox>
        <hbox align="center" style="margin: 3px 0">
          <html:label style="min-width: 80px; font-size: 0.9em">xAI</html:label>
          <html:input
            type="password"
            preference="extensions.zotero.__addonRef__.web.xai.apiKey"
            placeholder="xai-..."
            style="flex: 1; max-width: 320px"
          />
        </hbox>
      </vbox>

      <!-- Web Advanced -->
      <html:details style="margin-top: 6px">
        <html:summary
          style="cursor: pointer; color: #555; font-size: 0.9em"
          data-l10n-id="pref-advanced-settings"
        />
        <vbox style="padding: 4px 0 2px 12px">
          <hbox align="center" style="margin: 3px 0">
            <html:label style="min-width: 110px; font-size: 0.85em">Tavily Base URL</html:label>
            <html:input
              type="text"
              preference="extensions.zotero.__addonRef__.web.tavily.baseUrl"
              style="flex: 1; max-width: 250px; font-size: 0.85em"
            />
          </hbox>
          <hbox align="center" style="margin: 3px 0">
            <html:label style="min-width: 110px; font-size: 0.85em">Tavily Auth</html:label>
            <menulist
              preference="extensions.zotero.__addonRef__.web.tavily.authMode"
              value="body"
              style="max-width: 150px; font-size: 0.85em"
            >
              <menupopup>
                <menuitem label="Body (api_key)" value="body" />
                <menuitem label="Bearer" value="bearer" />
              </menupopup>
            </menulist>
          </hbox>
          <hbox align="center" style="margin: 3px 0">
            <html:label style="min-width: 110px; font-size: 0.85em">Firecrawl Base URL</html:label>
            <html:input
              type="text"
              preference="extensions.zotero.__addonRef__.web.firecrawl.baseUrl"
              style="flex: 1; max-width: 250px; font-size: 0.85em"
            />
          </hbox>
          <hbox align="center" style="margin: 3px 0">
            <html:label style="min-width: 110px; font-size: 0.85em">Exa Base URL</html:label>
            <html:input
              type="text"
              preference="extensions.zotero.__addonRef__.web.exa.baseUrl"
              style="flex: 1; max-width: 250px; font-size: 0.85em"
            />
          </hbox>
          <hbox align="center" style="margin: 3px 0">
            <html:label style="min-width: 110px; font-size: 0.85em">xAI Base URL</html:label>
            <html:input
              type="text"
              preference="extensions.zotero.__addonRef__.web.xai.baseUrl"
              style="flex: 1; max-width: 250px; font-size: 0.85em"
            />
          </hbox>
          <hbox align="center" style="margin: 3px 0">
            <html:label
              style="min-width: 110px; font-size: 0.85em"
              data-l10n-id="pref-web-xai-search-mode"
            />
            <menulist
              preference="extensions.zotero.__addonRef__.web.xai.searchMode"
              value="official"
              style="max-width: 200px; font-size: 0.85em"
            >
              <menupopup>
                <menuitem label="Official (Responses API)" value="official" />
                <menuitem label="Compatible (Social Gateway)" value="compatible" />
              </menupopup>
            </menulist>
          </hbox>
          <hbox align="center" style="margin: 3px 0">
            <html:label style="min-width: 110px; font-size: 0.85em">Proxy MCP Path</html:label>
            <html:input
              type="text"
              preference="extensions.zotero.__addonRef__.web.mysearch.mcpPath"
              style="max-width: 120px; font-size: 0.85em"
            />
          </hbox>
        </vbox>
      </html:details>
    </groupbox>

    <!-- ═══ Pluggable search providers ═══ -->
    <groupbox>
      <label><html:h2 data-l10n-id="pref-providers-title" /></label>
      <html:p
        style="color: #666; font-size: 0.85em; margin: 0 0 8px 0"
        data-l10n-id="pref-providers-desc"
      />
      <html:table style="width: 100%; border-collapse: collapse; margin-bottom: 8px">
        <html:thead>
          <html:tr style="text-align: left">
            <html:th style="padding: 4px">ID</html:th>
            <html:th style="padding: 4px">Name</html:th>
            <html:th style="padding: 4px">Ver</html:th>
            <html:th style="padding: 4px">Kind</html:th>
            <html:th style="padding: 4px">User</html:th>
          </html:tr>
        </html:thead>
        <html:tbody id="zrs-provider-list" />
      </html:table>
      <hbox align="center" style="flex-wrap: wrap; gap: 6px; margin-bottom: 8px">
        <html:button id="zrs-provider-refresh" data-l10n-id="pref-providers-refresh" />
        <html:button id="zrs-provider-import" data-l10n-id="pref-providers-import" />
        <html:button id="zrs-provider-reload" data-l10n-id="pref-providers-reload" />
      </hbox>
      <hbox align="center" style="margin: 6px 0">
        <html:label data-l10n-id="pref-providers-registry-url" style="min-width: 120px" />
        <html:input
          type="url"
          preference="extensions.zotero.__addonRef__.providers.registryUrl"
          placeholder="https://..."
          style="flex: 1; max-width: 420px"
        />
        <html:button
          id="zrs-provider-registry-check"
          data-l10n-id="pref-providers-registry-check"
          style="margin-left: 8px"
        />
      </hbox>
    </groupbox>

    <!-- ═══ Agent Skills ═══ -->
    <groupbox>
      <label><html:h2 data-l10n-id="pref-skills-title" /></label>
      <html:p
        style="color: #666; font-size: 0.85em; margin: 0 0 8px 0"
        data-l10n-id="pref-skills-description"
      />
      <hbox align="center" style="margin-bottom: 8px">
        <html:label
          for="skill-target-select"
          data-l10n-id="pref-skills-target-label"
          style="min-width: 100px"
        />
        <html:select id="skill-target-select" style="flex: 1; max-width: 260px">
          <html:option value="cursor">Cursor</html:option>
          <html:option value="claude-code">Claude Code</html:option>
          <html:option value="codex">Codex CLI</html:option>
          <html:option value="clipboard" data-l10n-id="pref-skills-target-clipboard" />
        </html:select>
      </hbox>
      <hbox style="gap: 8px; margin-bottom: 8px">
        <html:button
          id="export-skill-button"
          data-l10n-id="pref-skills-export-button"
          style="min-width: 120px"
        />
        <html:button
          id="install-skill-button"
          data-l10n-id="pref-skills-install-button"
          style="min-width: 120px"
        />
      </hbox>
      <html:div id="skill-export-message" style="font-size: 12px; color: #333; margin-top: 4px" />
    </groupbox>

    <!-- ═══ Infrastructure ═══ -->
    <groupbox>
      <label><html:h2 data-l10n-id="pref-infra-title" /></label>
      <hbox align="center">
        <checkbox
          preference="extensions.zotero.__addonRef__.mcp.server.enabled"
          data-l10n-id="pref-server-enabled"
        />
        <html:label data-l10n-id="pref-server-port" style="min-width: 50px; margin-left: 16px" />
        <html:input
          id="zrs-mcp-port-input"
          type="number"
          preference="extensions.zotero.__addonRef__.mcp.server.port"
          min="1024"
          max="65535"
          style="max-width: 80px"
        />
        <html:label
          data-l10n-id="pref-general-log-level"
          style="min-width: 70px; margin-left: 16px"
        />
        <menulist
          preference="extensions.zotero.__addonRef__.general.logLevel"
          value="info"
          style="max-width: 100px"
        >
          <menupopup>
            <menuitem label="Debug" value="debug" />
            <menuitem label="Info" value="info" />
            <menuitem label="Warn" value="warn" />
            <menuitem label="Error" value="error" />
          </menupopup>
        </menulist>
      </hbox>
    </groupbox>
  </vbox>
</prefpane>
