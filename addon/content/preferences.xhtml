            <html:input type="text" preference="extensions.zotero.__addonRef__.web.xai.baseUrl" style="flex: 1; max-width: 250px; font-size: 0.85em;" />
          </hbox>
          <hbox align="center" style="margin: 3px 0;">
            <html:label style="min-width: 110px; font-size: 0.85em;" data-l10n-id="pref-web-xai-search-mode" />
            <menulist preference="extensions.zotero.__addonRef__.web.xai.searchMode" value="official" style="max-width: 200px; font-size: 0.85em;">
              <menupopup>
                <menuitem label="Official (Responses API)" value="official" />
                <menuitem label="Compatible (Social Gateway)" value="compatible" />
              </menupopup>
            </menulist>
          </hbox>
          <hbox align="center" style="margin: 3px 0;">
            <html:label style="min-width: 110px; font-size: 0.85em;">Proxy MCP Path</html:label>
            <html:input type="text" preference="extensions.zotero.__addonRef__.web.mysearch.mcpPath" style="max-width: 120px; font-size: 0.85em;" />
          </hbox>
        </vbox>
      </html:details>
    </groupbox>

    <!-- ═══ Infrastructure ═══ -->
    <groupbox>
      <label><html:h2 data-l10n-id="pref-infra-title" /></label>
      <hbox align="center">
        <checkbox preference="extensions.zotero.__addonRef__.mcp.server.enabled" data-l10n-id="pref-server-enabled" />
        <html:label data-l10n-id="pref-server-port" style="min-width: 50px; margin-left: 16px;" />

        <html:label data-l10n-id="pref-general-log-level" style="min-width: 70px; margin-left: 16px;" />
        <menulist preference="extensions.zotero.__addonRef__.general.logLevel" value="info" style="max-width: 100px;">
          <menupopup>
            <menuitem label="Debug" value="debug" />
            <menuitem label="Info" value="info" />
            <menuitem label="Warn" value="warn" />
            <menuitem label="Error" value="error" />
          </menupopup>
        </menulist>
      </hbox>
    </groupbox>

  </vbox>
</prefpane>
