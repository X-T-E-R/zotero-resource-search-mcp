<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>

<prefpane
  id="__addonRef__-preferences"
  onload="
    try {
      Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window });
    } catch (e) {
      Zotero.debug('[ResourceSearch] prefs onload error: ' + e);
    }
  "
>
  <preferences>
    <preference
      id="extensions.zotero.__addonRef__.mcp.server.enabled"
      name="extensions.zotero.__addonRef__.mcp.server.enabled"
      type="bool"
    />
    <preference
      id="extensions.zotero.__addonRef__.mcp.server.port"
      name="extensions.zotero.__addonRef__.mcp.server.port"
      type="int"
    />
    <preference
      id="extensions.zotero.__addonRef__.general.fetchPDF"
      name="extensions.zotero.__addonRef__.general.fetchPDF"
      type="bool"
    />
    <preference
      id="extensions.zotero.__addonRef__.general.defaultSort"
      name="extensions.zotero.__addonRef__.general.defaultSort"
      type="string"
    />
    <preference
      id="extensions.zotero.__addonRef__.general.maxResults"
      name="extensions.zotero.__addonRef__.general.maxResults"
      type="int"
    />
    <preference
      id="extensions.zotero.__addonRef__.general.logLevel"
      name="extensions.zotero.__addonRef__.general.logLevel"
      type="string"
    />
    <preference
      id="extensions.zotero.__addonRef__.general.probeQueryAcademic"
      name="extensions.zotero.__addonRef__.general.probeQueryAcademic"
      type="string"
    />
    <preference
      id="extensions.zotero.__addonRef__.general.probeQueryPatent"
      name="extensions.zotero.__addonRef__.general.probeQueryPatent"
      type="string"
    />
    <preference
      id="extensions.zotero.__addonRef__.general.probeQueryWeb"
      name="extensions.zotero.__addonRef__.general.probeQueryWeb"
      type="string"
    />
    <preference
      id="extensions.zotero.__addonRef__.providers.registryUrl"
      name="extensions.zotero.__addonRef__.providers.registryUrl"
      type="string"
    />
    <preference
      id="extensions.zotero.__addonRef__.api.crossref.mailto"
      name="extensions.zotero.__addonRef__.api.crossref.mailto"
      type="string"
    />
    <preference
      id="extensions.zotero.__addonRef__.api.pubmed.key"
      name="extensions.zotero.__addonRef__.api.pubmed.key"
      type="string"
    />
    <preference
      id="extensions.zotero.__addonRef__.api.wos.key"
      name="extensions.zotero.__addonRef__.api.wos.key"
      type="string"
    />
    <preference
      id="extensions.zotero.__addonRef__.api.semanticScholar.key"
      name="extensions.zotero.__addonRef__.api.semanticScholar.key"
      type="string"
    />
    <preference
      id="extensions.zotero.__addonRef__.api.elsevier.key"
      name="extensions.zotero.__addonRef__.api.elsevier.key"
      type="string"
    />
    <preference
      id="extensions.zotero.__addonRef__.web.mysearch.baseUrl"
      name="extensions.zotero.__addonRef__.web.mysearch.baseUrl"
      type="string"
    />
    <preference
      id="extensions.zotero.__addonRef__.web.mysearch.apiKey"
      name="extensions.zotero.__addonRef__.web.mysearch.apiKey"
      type="string"
    />
    <preference
      id="extensions.zotero.__addonRef__.web.mysearch.mcpPath"
      name="extensions.zotero.__addonRef__.web.mysearch.mcpPath"
      type="string"
    />
    <preference
      id="extensions.zotero.__addonRef__.web.mysearch.proxyFirst"
      name="extensions.zotero.__addonRef__.web.mysearch.proxyFirst"
      type="bool"
    />
    <preference
      id="extensions.zotero.__addonRef__.web.tavily.apiKey"
      name="extensions.zotero.__addonRef__.web.tavily.apiKey"
      type="string"
    />
    <preference
      id="extensions.zotero.__addonRef__.web.tavily.baseUrl"
      name="extensions.zotero.__addonRef__.web.tavily.baseUrl"
      type="string"
    />
    <preference
      id="extensions.zotero.__addonRef__.web.tavily.authMode"
      name="extensions.zotero.__addonRef__.web.tavily.authMode"
      type="string"
    />
    <preference
      id="extensions.zotero.__addonRef__.web.firecrawl.apiKey"
      name="extensions.zotero.__addonRef__.web.firecrawl.apiKey"
      type="string"
    />
    <preference
      id="extensions.zotero.__addonRef__.web.firecrawl.baseUrl"
      name="extensions.zotero.__addonRef__.web.firecrawl.baseUrl"
      type="string"
    />
    <preference
      id="extensions.zotero.__addonRef__.web.exa.apiKey"
      name="extensions.zotero.__addonRef__.web.exa.apiKey"
      type="string"
    />
    <preference
      id="extensions.zotero.__addonRef__.web.exa.baseUrl"
      name="extensions.zotero.__addonRef__.web.exa.baseUrl"
      type="string"
    />
    <preference
      id="extensions.zotero.__addonRef__.web.xai.apiKey"
      name="extensions.zotero.__addonRef__.web.xai.apiKey"
      type="string"
    />
    <preference
      id="extensions.zotero.__addonRef__.web.xai.baseUrl"
      name="extensions.zotero.__addonRef__.web.xai.baseUrl"
      type="string"
    />
    <preference
      id="extensions.zotero.__addonRef__.web.xai.searchMode"
      name="extensions.zotero.__addonRef__.web.xai.searchMode"
      type="string"
    />
    <preference
      id="extensions.zotero.__addonRef__.web.tavily.enabled"
      name="extensions.zotero.__addonRef__.web.tavily.enabled"
      type="bool"
    />
    <preference
      id="extensions.zotero.__addonRef__.web.firecrawl.enabled"
      name="extensions.zotero.__addonRef__.web.firecrawl.enabled"
      type="bool"
    />
    <preference
      id="extensions.zotero.__addonRef__.web.exa.enabled"
      name="extensions.zotero.__addonRef__.web.exa.enabled"
      type="bool"
    />
    <preference
      id="extensions.zotero.__addonRef__.web.xai.enabled"
      name="extensions.zotero.__addonRef__.web.xai.enabled"
      type="bool"
    />
    <preference
      id="extensions.zotero.__addonRef__.web.mysearch.enabled"
      name="extensions.zotero.__addonRef__.web.mysearch.enabled"
      type="bool"
    />
  </preferences>

  <vbox flex="1" style="padding: 8px">
    <tabbox flex="1">
      <tabs>
        <tab id="zrs-tab-general" label="General" />
        <tab id="zrs-tab-sources" label="Sources" />
        <tab id="zrs-tab-manage" label="Manage" />
      </tabs>
      <tabpanels flex="1">
        <!-- Tab: General -->
        <tabpanel flex="1">
          <vbox flex="1" style="padding: 4px 0">
            <hbox align="start" style="margin-bottom: 10px; gap: 12px">
              <html:img
                id="zrs-pref-logo"
                height="56"
                width="56"
                style="border-radius: 8px; flex-shrink: 0"
                alt=""
              />
              <vbox style="flex: 1">
                <html:h2 data-l10n-id="pref-header-title" style="margin: 0 0 4px 0" />
                <html:p id="zrs-pref-version" style="margin: 0; color: #666; font-size: 0.88em" />
                <html:a
                  id="zrs-pref-homepage"
                  href="https://github.com/X-T-E-R/zotero-resource-search-mcp"
                  data-l10n-id="pref-header-homepage"
                  style="font-size: 0.85em"
                  >GitHub</html:a
                >
                <hbox align="center" style="margin-top: 8px">
                  <html:button id="zrs-open-workspace" data-l10n-id="pref-open-workspace-button">
                    Open Search Workspace
                  </html:button>
                </hbox>
              </vbox>
            </hbox>

            <groupbox>
              <label><html:h3 data-l10n-id="pref-server-title" /></label>
              <hbox align="center">
                <checkbox
                  preference="extensions.zotero.__addonRef__.mcp.server.enabled"
                  data-l10n-id="pref-server-enabled"
                />
                <html:label
                  data-l10n-id="pref-server-port"
                  style="min-width: 50px; margin-left: 16px"
                />
                <html:input
                  id="zrs-mcp-port-input"
                  type="number"
                  preference="extensions.zotero.__addonRef__.mcp.server.port"
                  min="1024"
                  max="65535"
                  style="max-width: 80px"
                />
              </hbox>
            </groupbox>

            <groupbox>
              <label><html:h3 data-l10n-id="pref-general-title" /></label>
              <checkbox
                preference="extensions.zotero.__addonRef__.general.fetchPDF"
                data-l10n-id="pref-general-fetchpdf"
              />
              <hbox align="center" style="margin: 6px 0">
                <html:label data-l10n-id="pref-general-default-sort" style="min-width: 120px" />
                <menulist
                  preference="extensions.zotero.__addonRef__.general.defaultSort"
                  value="relevance"
                  style="max-width: 160px"
                >
                  <menupopup>
                    <menuitem label="Relevance" value="relevance" />
                    <menuitem label="Date" value="date" />
                    <menuitem label="Citations" value="citations" />
                  </menupopup>
                </menulist>
                <html:label
                  data-l10n-id="pref-general-max-results"
                  style="min-width: 100px; margin-left: 16px"
                />
                <html:input
                  type="number"
                  preference="extensions.zotero.__addonRef__.general.maxResults"
                  min="1"
                  max="100"
                  style="max-width: 60px"
                />
              </hbox>
              <hbox align="center" style="margin: 6px 0">
                <html:label
                  data-l10n-id="pref-general-probe-query-academic"
                  style="min-width: 120px"
                />
                <html:input
                  type="text"
                  preference="extensions.zotero.__addonRef__.general.probeQueryAcademic"
                  placeholder="graph neural networks"
                  style="flex: 1; max-width: 320px"
                />
              </hbox>
              <hbox align="center" style="margin: 6px 0">
                <html:label
                  data-l10n-id="pref-general-probe-query-patent"
                  style="min-width: 120px"
                />
                <html:input
                  type="text"
                  preference="extensions.zotero.__addonRef__.general.probeQueryPatent"
                  placeholder="石墨烯传感器"
                  style="flex: 1; max-width: 320px"
                />
              </hbox>
              <hbox align="center" style="margin: 6px 0">
                <html:label data-l10n-id="pref-general-probe-query-web" style="min-width: 120px" />
                <html:input
                  type="text"
                  preference="extensions.zotero.__addonRef__.general.probeQueryWeb"
                  placeholder="latest llm benchmarks"
                  style="flex: 1; max-width: 320px"
                />
              </hbox>
            </groupbox>

            <groupbox>
              <label><html:h3 data-l10n-id="pref-logging-title" /></label>
              <hbox align="center">
                <html:label data-l10n-id="pref-general-log-level" style="min-width: 80px" />
                <menulist
                  preference="extensions.zotero.__addonRef__.general.logLevel"
                  value="info"
                  style="max-width: 100px"
                >
                  <menupopup>
                    <menuitem label="Debug" value="debug" />
                    <menuitem label="Info" value="info" />
                    <menuitem label="Warn" value="warn" />
                    <menuitem label="Error" value="error" />
                  </menupopup>
                </menulist>
              </hbox>
            </groupbox>
          </vbox>
        </tabpanel>

        <!-- Tab: Sources (dynamic + shared API keys) -->
        <tabpanel flex="1">
          <vbox flex="1" style="padding: 4px 0">
            <html:p
              data-l10n-id="pref-sources-intro"
              style="color: #555; font-size: 0.9em; margin: 0 0 8px 0"
            />
            <html:div id="zrs-sources-container" style="min-height: 80px" />
          </vbox>
        </tabpanel>

        <!-- Tab: Manage -->
        <tabpanel flex="1">
          <vbox flex="1" style="padding: 4px 0">
            <!-- ═══ Pluggable search providers ═══ -->
            <groupbox>
              <label><html:h2 data-l10n-id="pref-providers-title" /></label>
              <html:p
                style="color: #666; font-size: 0.85em; margin: 0 0 8px 0"
                data-l10n-id="pref-providers-desc"
              />
              <html:div
                style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px"
              >
                <hbox align="center" style="flex-wrap: wrap; gap: 8px">
                  <html:button id="zrs-provider-refresh">Refresh</html:button>
                  <html:button id="zrs-provider-import">Import .zip</html:button>
                  <html:button id="zrs-provider-reload">Reload</html:button>
                </hbox>
                <hbox align="center" style="flex-wrap: wrap; gap: 8px">
                  <html:label data-l10n-id="pref-providers-registry-url" style="min-width: 120px" />
                  <html:input
                    type="url"
                    preference="extensions.zotero.__addonRef__.providers.registryUrl"
                    placeholder="https://..."
                    style="flex: 1; max-width: 420px"
                  />
                  <html:button id="zrs-provider-registry-check">Check Registry</html:button>
                </hbox>
              </html:div>
              <html:div id="zrs-provider-guidance" style="margin: 0 0 10px 0" />
              <html:table style="width: 100%; border-collapse: collapse; margin-bottom: 8px">
                <html:thead>
                  <html:tr style="text-align: left">
                    <html:th id="zrs-provider-col-id" style="padding: 4px">ID</html:th>
                    <html:th id="zrs-provider-col-name" style="padding: 4px">Name</html:th>
                    <html:th id="zrs-provider-col-version" style="padding: 4px">Ver</html:th>
                    <html:th id="zrs-provider-col-kind" style="padding: 4px">Kind</html:th>
                    <html:th id="zrs-provider-col-state" style="padding: 4px">State</html:th>
                    <html:th id="zrs-provider-col-error" style="padding: 4px">Error</html:th>
                    <html:th id="zrs-provider-col-action" style="padding: 4px">Action</html:th>
                  </html:tr>
                </html:thead>
                <html:tbody id="zrs-provider-list" />
              </html:table>
            </groupbox>

            <!-- ═══ Agent Skills ═══ -->
            <groupbox>
              <label><html:h2 data-l10n-id="pref-skills-title" /></label>
              <html:p
                style="color: #666; font-size: 0.85em; margin: 0 0 8px 0"
                data-l10n-id="pref-skills-description"
              />
              <hbox align="center" style="margin-bottom: 8px">
                <html:label
                  for="skill-target-select"
                  data-l10n-id="pref-skills-target-label"
                  style="min-width: 100px"
                />
                <html:select id="skill-target-select" style="flex: 1; max-width: 260px">
                  <html:option value="cursor">Cursor</html:option>
                  <html:option value="claude-code">Claude Code</html:option>
                  <html:option value="codex">Codex CLI</html:option>
                  <html:option value="clipboard" data-l10n-id="pref-skills-target-clipboard" />
                </html:select>
              </hbox>
              <hbox style="gap: 8px; margin-bottom: 8px">
                <html:button id="export-skill-button" style="min-width: 120px">
                  Export Skill
                </html:button>
                <html:button id="install-skill-button" style="min-width: 120px">
                  Install to IDE
                </html:button>
              </hbox>
              <html:div
                id="skill-export-message"
                style="font-size: 12px; color: #333; margin-top: 4px"
              />
            </groupbox>
          </vbox>
        </tabpanel>
      </tabpanels>
    </tabbox>
  </vbox>
</prefpane>
